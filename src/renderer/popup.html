<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pass Manager</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      background: #1e1e2e;
      color: #cdd6f4;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .container {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    #search {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: none;
      border-bottom: 1px solid #313244;
      background: #181825;
      color: #cdd6f4;
      outline: none;
    }
    #search::placeholder { color: #6c7086; }
    .list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 8px;
      margin: 0 8px 2px;
    }
    .item:hover { background: #313244; }
    .item .name { font-weight: 500; }
    .item .copy-hint { font-size: 11px; color: #6c7086; }
    .item .item-actions { display: flex; align-items: center; gap: 6px; }
    .btn-delete {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #6c7086;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-delete:hover { background: #f38ba8; color: #1e1e2e; }
    .empty {
      padding: 24px 14px;
      text-align: center;
      color: #6c7086;
      font-size: 13px;
    }
    .drag-bar {
      -webkit-app-region: drag;
      height: 24px;
      background: #181825;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 8px;
    }
    .btn-close {
      -webkit-app-region: no-drag;
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #a6adc8;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-close:hover { background: #313244; color: #cdd6f4; }
    #search, .list, .item { -webkit-app-region: no-drag; }
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .confirm-box {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 12px;
      padding: 20px;
      max-width: 280px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .confirm-box p { margin: 0 0 16px; color: #cdd6f4; }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .confirm-actions button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
    .btn-confirm-cancel { background: #313244; color: #cdd6f4; }
    .btn-confirm-delete { background: #f38ba8; color: #1e1e2e; }
  </style>
</head>
<body>
  <div class="drag-bar"><button type="button" class="btn-close" id="btnClose" title="Kapat">×</button></div>
  <div class="container">
    <input type="text" id="search" placeholder="Şifre ara..." autocomplete="off" />
    <div class="list" id="list"></div>
  </div>
  <div id="confirmOverlay" class="confirm-overlay" style="display:none;">
    <div class="confirm-box">
      <p id="confirmMessage"></p>
      <div class="confirm-actions">
        <button type="button" class="btn-confirm-cancel" id="confirmCancel">İptal</button>
        <button type="button" class="btn-confirm-delete" id="confirmDelete">Sil</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
